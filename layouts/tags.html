<!DOCTYPE html>
<html lang="{lang}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{title} — {site_title}</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="top-nav">
    <a href="index.html" class="nav-home">{site_title}</a>
    <span class="nav-sep">›</span>
    <span class="nav-current">{title}</span>
    <a href="tags.html" class="nav-tags">Tags</a>
  </nav>

  <div class="tags-layout">
    <section class="tag-summary">
      <div class="tag-summary-header">
        <h2>Tags <span class="tag-total-count">({tag_count})</span></h2>
      </div>
      <ul class="tag-list">
        {tag_list}
      </ul>
    </section>

    <section class="tag-details">
      {tag_sections}
    </section>
  </div>
</body>
</html>
